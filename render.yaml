# Render.com Blueprint - GRC Pro
# Deploy: connect this repo to Render and it auto-detects this file.
# Docs: https://docs.render.com/infrastructure-as-code

databases:
  - name: grc-pro-db
    plan: free
    databaseName: grc_pro
    user: grc_pro_user
    region: oregon

services:
  # ── Backend API (FastAPI) ──────────────────────────────────
  - type: web
    name: grc-pro-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: ./render-build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grc-pro-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://grc-pro-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.7"

  # ── Frontend (Angular Static Site) ─────────────────────────
  - type: web
    name: grc-pro-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npx ng build --configuration production
    staticPublishPath: dist/grc-pro/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "18"
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
