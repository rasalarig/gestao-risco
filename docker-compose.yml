version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: grc_pro_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kpmg_risk
      POSTGRES_USER: kpmg
      POSTGRES_PASSWORD: kpmg123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpmg -d kpmg_risk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
